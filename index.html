<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moneybox</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ─── Views ────────────────────────────────────────────────── */
    .view { display: none; width: 100%; max-width: 480px; }
    .view.active { display: block; }

    /* ─── Setup View ────────────────────────────────────────────── */
    #view-setup .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }

    #view-setup h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    #view-setup p {
      color: #888;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    /* ─── Dashboard View ─────────────────────────────────────────── */
    #view-dashboard .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }

    #view-dashboard h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    #view-dashboard p {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    /* ─── Shared Components ──────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }

    .btn-primary {
      background: #3b82f6;
      color: #ffffff;
    }

    .btn-secondary {
      background: #2a2d3a;
      color: #f0f0f0;
    }

    /* ─── Debug Banner (Stage 0 only) ────────────────────────────── */
    #debug-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ─── Setup View ──────────────────────────────────────────── -->
  <div id="view-setup" class="view">
    <div class="card">
      <h1>Moneybox</h1>
      <p>Let's get you set up.</p>
      <button class="btn btn-primary" onclick="App.showView('dashboard')">
        Go to Dashboard →
      </button>
    </div>
  </div>

  <!-- ─── Dashboard View ─────────────────────────────────────── -->
  <div id="view-dashboard" class="view">
    <div class="card">
      <h1>Dashboard</h1>
      <p>Your burndown will appear here.</p>
      <button class="btn btn-secondary" onclick="App.showView('setup')">
        ← Back to Setup
      </button>
    </div>
  </div>

  <!-- ─── Debug Banner ───────────────────────────────────────── -->
  <div id="debug-banner">
    Stage 0 shell · version check: <span id="debug-version">—</span> · view: <span id="debug-view">—</span>
  </div>

  <script>
    'use strict';

    const APP_VERSION = '2.0';

    const Storage = {
      get(key) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          console.error('Storage.get failed:', key, e);
          return null;
        }
      },
      set(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.error('Storage.set failed:', key, e);
        }
      },
      remove(key) {
        try {
          localStorage.removeItem(key);
        } catch (e) {
          console.error('Storage.remove failed:', key, e);
        }
      },
      clear() {
        try {
          const keys = Object.keys(localStorage).filter(k => k.startsWith('burndown_'));
          keys.forEach(k => localStorage.removeItem(k));
        } catch (e) {
          console.error('Storage.clear failed:', e);
        }
      }
    };

    function parseNum(str) {
      if (typeof str !== 'string') str = String(str);
      return parseFloat(str.replace(',', '.').trim());
    }

    function checkVersion() {
      const stored = Storage.get('burndown_version');
      if (stored !== APP_VERSION) {
        Storage.clear();
        Storage.set('burndown_version', APP_VERSION);
        return false;
      }
      return true;
    }

    const App = {
      currentView: null,

      showView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const target = document.getElementById(`view-${name}`);
        if (target) {
          target.classList.add('active');
          App.currentView = name;
          document.getElementById('debug-view').textContent = name;
        }
      },

      init() {
        const versionOk = checkVersion();
        document.getElementById('debug-version').textContent =
          versionOk ? `${APP_VERSION} ✓` : `wiped → ${APP_VERSION}`;

        const setup = Storage.get('burndown_setup');
        if (setup) {
          App.showView('dashboard');
        } else {
          App.showView('setup');
        }
      }
    };

    document.addEventListener('DOMContentLoaded', App.init);
  </script>

</body>
</html>
